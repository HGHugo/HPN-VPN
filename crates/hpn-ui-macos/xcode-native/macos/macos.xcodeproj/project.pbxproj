			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "# Build the Tauri binary and replace the Xcode-compiled binary.\n# This ensures Xcode signs the Tauri binary (with embedded React UI)\n# in the same operation as the packet-tunnel extension.\n\nREPO_ROOT=\"${SRCROOT}/../../../..\"\nTAURI_DIR=\"${REPO_ROOT}/crates/hpn-ui-macos\"\nTARGET_ARCH=\"aarch64-apple-darwin\"\nTAURI_BINARY=\"${REPO_ROOT}/target/${TARGET_ARCH}/release/hpn-ui-macos\"\n\n# Build UI if dist doesn't exist\nif [ ! -f \"${TAURI_DIR}/ui/dist/index.html\" ]; then\n    cd \"${TAURI_DIR}/ui\"\n    npm run build\nfi\n\n# Build Tauri binary (release, no bundle)\ncd \"${REPO_ROOT}\"\nexport MACOSX_DEPLOYMENT_TARGET=14.0\ncargo build --release --target ${TARGET_ARCH} -p hpn-ui-macos 2>&1\n\n# Replace the Xcode-compiled binary with the Tauri binary\ncp -f \"${TAURI_BINARY}\" \"${BUILT_PRODUCTS_DIR}/${EXECUTABLE_PATH}\"\n\necho \"Replaced binary with Tauri build ($(wc -c < ${TAURI_BINARY}) bytes)\"\n";
		};
		AA000002AAAA000000000002 /* Build hpn-tunnel-ext staticlib */ = {
			isa = PBXShellScriptBuildPhase;
			buildActionMask = 2147483647;
			files = (
			);
			inputPaths = (
				"$(SRCROOT)/../../../../crates/hpn-tunnel-ext/Cargo.toml",
				"$(SRCROOT)/../../../../crates/hpn-tunnel-ext/src/lib.rs",
				"$(SRCROOT)/../../../../crates/hpn-core/src/provider_envelope.rs",
				"$(SRCROOT)/../../../../crates/hpn-core/src/lib.rs",
				"$(SRCROOT)/../../../../crates/hpn-client-core/src/lib.rs",
				"$(SRCROOT)/../../../../Cargo.toml",
				"$(SRCROOT)/../../../../Cargo.lock",
			);
			name = "Build hpn-tunnel-ext staticlib";
			outputPaths = (
				"$(SRCROOT)/../../../../target/aarch64-apple-darwin/release/libhpn_tunnel_ext.a",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/bash;
			shellScript = "# Build the Rust staticlib that the packet-tunnel Swift target links\n# against. Without this build phase, Xcode has no idea the .a file has\n# Rust source dependencies and links a stale cached lib whenever lib.rs\n# changes — leading to 'Undefined symbol: _hpn_envelope_unwrap_to_buf'\n# and similar link failures.\n#\n# inputPaths above lets Xcode track the source files so this script is\n# only re-run when one of them is newer than the .a output file.\n#\n# CARGO_TARGET_DIR is left to its default ($CARGO_HOME/target) so cargo\n# can reuse incremental compilation state. The output .a path is\n# stable: target/aarch64-apple-darwin/release/libhpn_tunnel_ext.a\n\nset -euo pipefail\n\n# We canonicalise REPO_ROOT below because the Xcode-bundled `nm`\n# (= llvm-nm) refuses paths containing unresolved '..' segments\n# with a 'No such file or directory' error, even when the\n# underlying file exists. BSD nm tolerates them; llvm-nm does not.\nREPO_ROOT=\"${SRCROOT}/../../../..\"\nTARGET_ARCH=\"aarch64-apple-darwin\"\n\necho \"Building hpn-tunnel-ext staticlib for ${TARGET_ARCH}\"\ncd \"${REPO_ROOT}\"\nREPO_ROOT=\"$(pwd -P)\"\nexport MACOSX_DEPLOYMENT_TARGET=14.0\n\n# Pick up cargo from the user's PATH (rustup-managed) — Xcode strips\n# /opt/homebrew/bin etc. from the build environment.\nexport PATH=\"$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH\"\n\ncargo build --release --target \"${TARGET_ARCH}\" -p hpn-tunnel-ext 2>&1\n\n# Sanity check: verify the symbols the Swift extension actually links\n# against are present. If we ever push a Rust change that drops a\n# `#[unsafe(no_mangle)]` attribute on one of the FFI exports, this\n# fails fast inside Xcode rather than at the final link step where\n# the error would be much harder to map back to a source change.\n#\n# Implementation note: we use bash's built-in [[ \"$VAR\" == *needle* ]]\n# substring test instead of `printf | grep -q` because:\n#   1. With `set -o pipefail`, grep -q exits as soon as a match is\n#      found, SIGPIPE-killing the upstream printf. The pipe then\n#      reports failure (141) which the surrounding `if !` flips back\n#      to success — silently triggering the error branch even though\n#      the symbol IS present. The bug is virtually un-debuggable from\n#      the build log alone.\n#   2. The substring test is pure bash, runs in-process, and\n#      bypasses the pipe entirely.\nLIB=\"${REPO_ROOT}/target/${TARGET_ARCH}/release/libhpn_tunnel_ext.a\"\nLIB_SYMBOLS=$(/usr/bin/nm -gU \"$LIB\" 2>/dev/null || true)\nif [ -z \"$LIB_SYMBOLS\" ]; then\n    echo \"error: nm produced no symbol output for $LIB. Check that the file exists and that /usr/bin/nm is functional.\" >&2\n    exit 1\nfi\nfor sym in _hpn_tunnel_start _hpn_envelope_unwrap_to_buf _hpn_tunnel_stop _hpn_tunnel_get_settings_json _hpn_tunnel_write_packets _hpn_tunnel_read_packets; do\n    if [[ \"$LIB_SYMBOLS\" != *\" ${sym}\"$'\\n'* && \"$LIB_SYMBOLS\" != *\" ${sym}\" ]]; then\n        echo \"error: ${sym} missing from $(basename \"$LIB\") — Rust FFI export was probably renamed or removed\" >&2\n        exit 1\n    fi\ndone\necho \"hpn-tunnel-ext staticlib built and FFI symbols verified\"\n";
		};
