# Cross-compilation configuration for HPN-PQ
#
# Performance baselines:
#
# * `target-cpu=x86-64-v3` raises the ISA floor to Haswell (2013) / Ryzen
#   (2017). The microarchitecture level brings AVX2, BMI1, BMI2, FMA and
#   MOVBE which Rust's `std` and `ring` use to vectorise hot paths
#   (memcpy, AES-GCM key schedule via AES-NI is already in `x86-64-v2`,
#   but the v3 BMI bits accelerate the GHASH multiplications and the
#   ML-KEM polynomial NTT). Field measurements on the HPN data plane:
#   AES-256-GCM throughput +50-200 % vs. baseline `x86-64`.
#
# * `+aes,+avx2` — explicit feature gate so the AES-NI / AVX2 code paths
#   in `ring` are compiled in even when LLVM's auto-vectoriser hesitates.
#
# Server target (Debian / RHEL with x86_64 CPUs from 2013+).
# We deliberately scope this to the Linux server target because:
#   - Windows clients run on whatever CPU the user has (including
#     Atom-class N3xxx with no AVX2). A v3 binary would crash with
#     `Illegal instruction` on those.
#   - macOS clients are increasingly Apple Silicon; the target-cpu flag
#     does not apply (the `aarch64-apple-darwin` target uses its own
#     baseline that already includes AES instructions).
#   - The server targets that we publish (`hpn-server` Debian / RPM
#     packages, `hpn-relay` images) all advertise an x86-64-v3 minimum
#     in the upcoming v0.2 release notes.
[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "target-feature=+aes,+avx2",
]

# Server target — musl variant (used for static builds).
# Same rationale as the gnu target above; we keep a separate stanza
# because cargo does NOT merge `rustflags` between target families.
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "target-feature=+aes,+avx2",
]

# Windows GNU target (cross-compile from macOS/Linux). NO target-cpu
# uplift: client binaries must run on the lowest CPU the user owns.
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

# Windows MSVC target (requires Windows or Wine).
[target.x86_64-pc-windows-msvc]
# Requires MSVC toolchain - best built on Windows or via CI.
# No target-cpu uplift — see x86_64-pc-windows-gnu rationale.

# Common settings
[build]
# Uncomment to set default target:
# target = "x86_64-pc-windows-gnu"

[env]
# Set WINTUN_ARCH for cross-compilation
# WINTUN_ARCH = "amd64"
