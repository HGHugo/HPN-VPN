# Cargo audit configuration
# Ignore unmaintained warnings for Tauri dependencies that are being migrated to GTK4

[advisories]
# Ignore GTK3 unmaintained warnings - Tauri is migrating to GTK4
ignore = [
    "RUSTSEC-2024-0413", # atk - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0416", # atk-sys - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0412", # gdk - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0418", # gdk-sys - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0411", # gdkwayland-sys - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0417", # gdkx11 - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0414", # gdkx11-sys - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0415", # gtk - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0420", # gtk-sys - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0419", # gtk3-macros - gtk-rs GTK3 bindings
    "RUSTSEC-2024-0370", # proc-macro-error - used by GTK3 macros
    "RUSTSEC-2024-0429", # glib unsoundness - waiting for Tauri GTK4 migration
    
    # Ignore unmaintained crates used by Tauri dependencies
    "RUSTSEC-2025-0057", # fxhash - used by selectors (Tauri dep)
    "RUSTSEC-2024-0436", # paste - used by pqcrypto and netlink
    
    # Ignore UNIC crates - used by urlpattern (Tauri dependency)
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0100", # unic-ucd-ident
    "RUSTSEC-2025-0098", # unic-ucd-version
]

# Note: All these dependencies come from Tauri's GTK3 bindings on Linux.
# Tauri team is actively migrating to GTK4. Once they release the migration,
# we will update and these warnings will disappear.
# 
# Reference: https://github.com/tauri-apps/tauri/issues/7372
# 
# Our own code does NOT use GTK directly - this is purely a Tauri UI dependency.
